[gateway]
name = "powergateway-01"
log_level = "INFO"
status_path = "/var/lib/powergateway/status.json"
health_interval = 30
status_interval = 30

[meter]
protocol = "sml"
device = "auto"
baudrate = 9600
read_timeout = 1.0
reconnect_interval = 10

[mqtt]
enabled = false
host = "192.168.1.10"
port = 1883
username = ""
password = ""
topic_prefix = "powergateway/powergateway-01"
tls = false
ca_file = ""
homeassistant_discovery = true
discovery_prefix = "homeassistant"

[lte]
enabled = true
interface = "auto"
connection_check_host = "1.1.1.1"

[wireguard]
enabled = false
interface = "wg0"

[buffer]
enabled = true
path = "/var/lib/powergateway/buffer.db"
max_messages = 10000
flush_batch_size = 100

[web]
enabled = true
host = "0.0.0.0"
port = 8080
