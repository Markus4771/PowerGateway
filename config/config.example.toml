[gateway]
name = "powergateway-01"
log_level = "INFO"
status_path = "/var/lib/powergateway/status.json"
health_interval = 30
status_interval = 30

[meter]
# Datenquelle: "usb_sml", "simulation" oder "tasmota_mqtt".
source = "usb_sml"
protocol = "sml"
device = "auto"
baudrate = 9600
read_timeout = 1.0
reconnect_interval = 10
# Verfügbare Simulationsprofile: generic, emh, easymeter, iskra, kaifa, solar, unknown
simulation_profile = "generic"
simulation_interval = 5.0
simulation_seed = 4771

[meter.tasmota]
# Der Tasmota-Lesekopf sendet seine Werte an diesen MQTT-Broker.
# Ohne abweichende Angaben werden Host, Port und Zugangsdaten aus [mqtt] übernommen.
topic = "tele/Stromzaehler/SENSOR"
client_id = "powergateway-tasmota-source"
qos = 0
read_timeout = 2.0
# JSON-Pfade passend zum vorhandenen Tasmota-Script.
power_path = "Home.Power_curr"
energy_import_path = "Home.total_in"
energy_export_path = ""
voltage_l1_path = ""
voltage_l2_path = ""
voltage_l3_path = ""
current_l1_path = ""
current_l2_path = ""
current_l3_path = ""
frequency_path = ""

[mqtt]
enabled = false
host = "192.168.1.10"
port = 1883
username = ""
password = ""
topic_prefix = "powergateway/powergateway-01"
tls = false
ca_file = ""
homeassistant_discovery = true
discovery_prefix = "homeassistant"

[lte]
enabled = true
interface = "auto"
connection_check_host = "1.1.1.1"

[wireguard]
enabled = false
interface = "wg0"

[buffer]
enabled = true
path = "/var/lib/powergateway/buffer.db"
max_messages = 10000
flush_batch_size = 100

[web]
enabled = true
host = "0.0.0.0"
port = 8080
stale_after_seconds = 30
