[gateway]
name = "powergateway-01"
log_level = "INFO"
status_path = "/var/lib/powergateway/status.json"
health_interval = 30
status_interval = 30

[meter]
# Datenquellen: "usb_sml", "tasmota_mqtt" oder "simulation".
source = "usb_sml"
protocol = "sml"
device = "auto"
baudrate = 9600
read_timeout = 1.0
reconnect_interval = 10
simulation_profile = "generic"
simulation_interval = 5.0
simulation_seed = 4771

[meter.tasmota]
topic = "tele/Stromzaehler/SENSOR"
power_path = "Home.Power_curr"
energy_import_path = "Home.total_in"
energy_export_path = ""

[mqtt]
enabled = false
host = "192.168.1.10"
port = 1883
username = ""
password = ""
topic_prefix = "powergateway/powergateway-01"
tls = false
ca_file = ""
homeassistant_discovery = true
discovery_prefix = "homeassistant"

[network]
# Reihenfolge für automatisches Fallback. Der erste verfügbare Zugang gewinnt.
priority = ["lan", "wifi", "lte"]
apply_priorities_on_start = true
connection_check_host = "1.1.1.1"

[network.lan]
enabled = true
interface = "auto"
# Optional Name des NetworkManager-Verbindungsprofils, z. B. "Kabelgebundene Verbindung 1".
connection = ""
dhcp = true
address = ""
gateway = ""
dns = []

[network.wifi]
enabled = true
interface = "auto"
# Bereits vorhandenes NetworkManager-Profil. SSID/Passwort werden später über die WebGUI gesetzt.
connection = "PowerGateway-WLAN"
ssid = ""
password = ""
dhcp = true
address = ""
gateway = ""
dns = []

[network.lte]
enabled = true
interface = "auto"
connection = "PowerGateway-LTE"
apn = "internet"
username = ""
password = ""
pin = ""
roaming = false

[wireguard]
enabled = false
interface = "wg0"

[buffer]
enabled = true
path = "/var/lib/powergateway/buffer.db"
max_messages = 10000
flush_batch_size = 100

[web]
enabled = true
host = "0.0.0.0"
port = 8080
stale_after_seconds = 30
